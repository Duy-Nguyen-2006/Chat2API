<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat2API — Command Deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-onyx: #08090a;
      --color-charcoal: #0f1011;
      --color-obsidian: #161718;
      --color-graphite: #23252a;
      --color-iron: #323334;
      --color-steel: #383b3f;
      --color-slate: #62666d;
      --color-fog: #8a8f98;
      --color-mist: #d0d6e0;
      --color-snow: #f7f8f8;
      --color-acid-lime: #e4f222;
      --color-indigo: #5e6ad2;
      --color-emerald: #27a644;
      --color-crimson: #eb5757;
      --color-cyan: #02b8cc;
      --font-ui: 'Inter', ui-sans-serif, system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
      --shadow-sm: rgba(0, 0, 0, 0.4) 0px 2px 4px 0px;
      --shadow-subtle: rgb(35, 37, 42) 0px 0px 0px 1px inset;
      --shadow-xl: rgba(8, 9, 10, 0.6) 0px 4px 32px 0px;
      --radius-nav: 6px;
      --radius-cards: 12px;
      --radius-pills: 9999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      font-weight: 400;
      font-size: 14px;
      line-height: 1.47;
      color: var(--color-snow);
      background: var(--color-onyx);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .mono { font-family: var(--font-mono); font-size: 12px; letter-spacing: -0.015em; }

    /* ── Top Nav ── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 56px;
      background: var(--color-charcoal);
      border-bottom: 1px solid var(--color-graphite);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: -0.01em;
    }
    .nav-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-acid-lime);
      box-shadow: 0 0 8px rgba(228, 242, 34, 0.5);
    }
    .nav-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--color-fog);
      font-size: 13px;
    }
    .nav-meta span { color: var(--color-mist); }

    /* ── Layout ── */
    .deck {
      display: grid;
      grid-template-columns: 280px 280px 1fr;
      grid-template-rows: auto 1fr auto;
      height: calc(100vh - 56px);
      max-width: 1400px;
      margin: 0 auto;
    }

    .panel {
      border-right: 1px solid var(--color-graphite);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--color-onyx);
    }
    .panel:last-of-type { border-right: none; }

    .panel-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--color-graphite);
      flex-shrink: 0;
    }
    .panel-title {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-slate);
      margin-bottom: 4px;
    }
    .panel-subtitle {
      font-size: 13px;
      color: var(--color-fog);
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    /* ── Breadcrumb ── */
    .breadcrumb {
      grid-column: 1 / -1;
      padding: 10px 20px;
      border-bottom: 1px solid var(--color-graphite);
      background: var(--color-charcoal);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--color-fog);
    }
    .breadcrumb-item { cursor: pointer; transition: color 0.15s; }
    .breadcrumb-item:hover { color: var(--color-snow); }
    .breadcrumb-item.active { color: var(--color-snow); font-weight: 500; }
    .breadcrumb-sep { color: var(--color-slate); user-select: none; }

    /* ── Row Card ── */
    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-nav);
      cursor: pointer;
      transition: background 0.12s, box-shadow 0.12s;
      border: 1px solid transparent;
      margin-bottom: 4px;
    }
    .row:hover {
      background: var(--color-obsidian);
      border-color: var(--color-graphite);
    }
    .row.selected {
      background: var(--color-obsidian);
      border-color: var(--color-graphite);
      box-shadow: var(--shadow-subtle);
    }
    .row-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-nav);
      background: var(--color-charcoal);
      border: 1px solid var(--color-graphite);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 14px;
    }
    .row-content { flex: 1; min-width: 0; }
    .row-title {
      font-weight: 500;
      font-size: 14px;
      color: var(--color-snow);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .row-meta {
      font-size: 12px;
      color: var(--color-fog);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Status Pill ── */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-alive { color: var(--color-emerald); }
    .status-alive .status-dot { background: var(--color-emerald); box-shadow: 0 0 6px rgba(39, 166, 68, 0.5); }
    .status-dead { color: var(--color-crimson); }
    .status-dead .status-dot { background: var(--color-crimson); box-shadow: 0 0 6px rgba(235, 87, 87, 0.4); }

    /* ── GPT / Mode cards ── */
    .mode-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
      padding: 8px;
    }
    .mode-card {
      background: var(--color-obsidian);
      border: 1px solid var(--color-graphite);
      border-radius: var(--radius-cards);
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      box-shadow: var(--shadow-sm);
    }
    .mode-card:hover {
      border-color: var(--color-iron);
    }
    .mode-card.selected {
      border-color: var(--color-indigo);
      box-shadow: var(--shadow-subtle), 0 0 0 1px rgba(94, 106, 210, 0.3);
    }
    .mode-card-icon {
      font-size: 20px;
      margin-bottom: 10px;
    }
    .mode-card-title {
      font-weight: 500;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .mode-card-desc {
      font-size: 12px;
      color: var(--color-fog);
      line-height: 1.5;
    }
    .mode-card-id {
      margin-top: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--color-slate);
    }

    /* ── Chat Panel ── */
    .chat-panel {
      grid-column: 1 / -1;
      border-top: 1px solid var(--color-graphite);
      background: var(--color-charcoal);
      display: flex;
      flex-direction: column;
      max-height: 360px;
      min-height: 200px;
    }
    .chat-panel.hidden { display: none; }

    .chat-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--color-graphite);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .chat-header-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-mist);
    }
    .chat-header-mode {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--color-indigo);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: var(--radius-nav);
      font-size: 14px;
      line-height: 1.5;
    }
    .msg-user {
      align-self: flex-end;
      background: var(--color-steel);
      color: var(--color-snow);
    }
    .msg-assistant {
      align-self: flex-start;
      background: var(--color-obsidian);
      border: 1px solid var(--color-graphite);
      color: var(--color-mist);
    }
    .msg-system {
      align-self: center;
      font-size: 12px;
      color: var(--color-slate);
      padding: 4px 8px;
    }

    .chat-input-row {
      padding: 12px 20px;
      border-top: 1px solid var(--color-graphite);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      background: var(--color-steel);
      border: none;
      border-radius: var(--radius-nav);
      padding: 10px 14px;
      color: var(--color-snow);
      font-family: var(--font-ui);
      font-size: 14px;
      outline: none;
      box-shadow: rgba(0, 0, 0, 0.2) 0px 0px 0px 1px inset;
    }
    .chat-input::placeholder { color: var(--color-slate); }
    .chat-input:focus { box-shadow: 0 0 0 1px var(--color-indigo); }

    .btn-send {
      background: var(--color-acid-lime);
      color: #030404;
      border: none;
      border-radius: var(--radius-nav);
      padding: 10px 20px;
      font-family: var(--font-ui);
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: rgba(0,0,0,0.01) 0px 5px 2px, rgba(0,0,0,0.04) 0px 3px 2px, rgba(0,0,0,0.07) 0px 1px 1px;
      transition: opacity 0.15s;
    }
    .btn-send:hover { opacity: 0.9; }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Empty / Loading ── */
    .empty {
      padding: 32px 20px;
      text-align: center;
      color: var(--color-slate);
      font-size: 13px;
    }
    .empty-icon { font-size: 24px; margin-bottom: 8px; opacity: 0.5; }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 24px;
      color: var(--color-fog);
      font-size: 13px;
    }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--color-graphite);
      border-top-color: var(--color-indigo);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-refresh {
      background: transparent;
      border: 1px solid var(--color-graphite);
      color: var(--color-fog);
      border-radius: var(--radius-nav);
      padding: 6px 12px;
      font-size: 12px;
      font-family: var(--font-ui);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-refresh:hover { color: var(--color-snow); border-color: var(--color-iron); }

    .tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: 2px;
      background: rgba(94, 106, 210, 0.15);
      color: var(--color-indigo);
      margin-left: 6px;
      vertical-align: middle;
    }

    @media (max-width: 900px) {
      .deck { grid-template-columns: 1fr; grid-template-rows: auto; height: auto; }
      .panel { border-right: none; border-bottom: 1px solid var(--color-graphite); max-height: 320px; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <div class="nav-dot"></div>
    Chat2API Command Deck
  </div>
  <div class="nav-meta">
    <span id="nav-stats">—</span>
    <button class="btn-refresh" onclick="loadAccounts()">Refresh</button>
  </div>
</nav>

<div class="deck">
  <div class="breadcrumb" id="breadcrumb">
    <span class="breadcrumb-item active" data-level="root">Accounts</span>
  </div>
  <!-- Panel 1: Accounts -->
  <div class="panel" id="panel-accounts">
    <div class="panel-header">
      <div class="panel-title">Accounts</div>
      <div class="panel-subtitle">Session health monitor</div>
    </div>
    <div class="panel-body" id="accounts-list">
      <div class="loading"><div class="spinner"></div> Scanning accounts…</div>
    </div>
  </div>

  <!-- Panel 2: Workspaces -->
  <div class="panel" id="panel-workspaces">
    <div class="panel-header">
      <div class="panel-title">Workspaces</div>
      <div class="panel-subtitle" id="ws-subtitle">Select an account</div>
    </div>
    <div class="panel-body" id="workspaces-list">
      <div class="empty"><div class="empty-icon">◎</div>Chọn account bên trái</div>
    </div>
  </div>

  <!-- Panel 3: GPTs / Chat mode -->
  <div class="panel" id="panel-modes">
    <div class="panel-header">
      <div class="panel-title">Chat Mode</div>
      <div class="panel-subtitle" id="mode-subtitle">Select a workspace</div>
    </div>
    <div class="panel-body" id="modes-list">
      <div class="empty"><div class="empty-icon">◎</div>Chọn workspace ở giữa</div>
    </div>
  </div>

  <!-- Chat panel -->
  <div class="chat-panel hidden" id="chat-panel">
    <div class="chat-header">
      <div class="chat-header-title">Session</div>
      <div class="chat-header-mode" id="chat-mode-label">—</div>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" placeholder="Nhập tin nhắn…" autocomplete="off" />
      <button class="btn-send" id="btn-send" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
const state = {
  account: null,
  workspace: null,
  mode: null,       // { type: 'default' | 'gizmo', gizmo_id?, label }
  messages: [],
  sending: false,
};

async function api(path, opts = {}) {
  const res = await fetch(path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || data.error?.message || `HTTP ${res.status}`);
  return data;
}

function shortId(id) {
  if (!id) return '—';
  return id.length > 16 ? id.slice(0, 8) + '…' + id.slice(-4) : id;
}

function statusPill(status) {
  const alive = status === 'alive';
  return `<span class="status ${alive ? 'status-alive' : 'status-dead'}">
    <span class="status-dot"></span>${alive ? 'Alive' : 'Dead'}
  </span>`;
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = `<span class="breadcrumb-item ${!state.account ? 'active' : ''}" onclick="resetTo('root')">Accounts</span>`;
  if (state.account) {
    html += `<span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-item ${!state.workspace ? 'active' : ''}" onclick="resetTo('account')">${esc(state.account.label)}</span>`;
  }
  if (state.workspace) {
    html += `<span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-item ${!state.mode ? 'active' : ''}" onclick="resetTo('workspace')">${esc(state.workspace.title)}</span>`;
  }
  if (state.mode) {
    html += `<span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-item active">${esc(state.mode.label)}</span>`;
  }
  bc.innerHTML = html;
}

function resetTo(level) {
  if (level === 'root') {
    state.account = null; state.workspace = null; state.mode = null;
    renderWorkspacesEmpty(); renderModesEmpty(); hideChat();
  } else if (level === 'account') {
    state.workspace = null; state.mode = null;
    renderModesEmpty(); hideChat();
  } else if (level === 'workspace') {
    state.mode = null; hideChat();
    renderModes();
  }
  updateBreadcrumb();
  highlightRows();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

async function loadAccounts() {
  const el = document.getElementById('accounts-list');
  el.innerHTML = '<div class="loading"><div class="spinner"></div> Scanning accounts…</div>';
  try {
    const data = await api('/admin/api/accounts');
    const accounts = data.data || [];
    document.getElementById('nav-stats').textContent =
      `${accounts.length} account(s) · ${accounts.filter(a => a.status === 'alive').length} alive`;

    if (!accounts.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">∅</div>No accounts found.<br>Thêm cookies_*.json hoặc cấu hình .env</div>';
      return;
    }

    el.innerHTML = accounts.map(a => `
      <div class="row" data-account-id="${esc(a.id)}" onclick="selectAccount('${esc(a.id)}', this)">
        <div class="row-icon">${a.status === 'alive' ? '●' : '○'}</div>
        <div class="row-content">
          <div class="row-title">${esc(a.label)}</div>
          <div class="row-meta mono">${esc(a.email || a.account_id || a.cookies_file || '')}</div>
        </div>
        ${statusPill(a.status)}
      </div>
    `).join('');

    // Store account data
    window._accounts = Object.fromEntries(accounts.map(a => [a.id, a]));
    highlightRows();
  } catch (e) {
    el.innerHTML = `<div class="empty">Error: ${esc(e.message)}</div>`;
  }
}

async function selectAccount(id, el) {
  const acc = window._accounts?.[id];
  if (!acc) return;
  state.account = acc;
  state.workspace = null;
  state.mode = null;
  hideChat();
  updateBreadcrumb();
  highlightRows();

  document.getElementById('ws-subtitle').textContent = acc.label;
  const wsEl = document.getElementById('workspaces-list');
  wsEl.innerHTML = '<div class="loading"><div class="spinner"></div> Loading workspaces…</div>';
  renderModesEmpty();

  if (acc.status !== 'alive') {
    wsEl.innerHTML = `<div class="empty"><div class="empty-icon">✕</div>Account dead — ${esc(acc.status_detail || 'session expired')}</div>`;
    return;
  }

  try {
    const data = await api(`/admin/api/accounts/${id}/workspaces`);
    const workspaces = data.data || [];
    window._workspaces = Object.fromEntries(workspaces.map(w => [w.id, w]));

    if (!workspaces.length) {
      wsEl.innerHTML = '<div class="empty">No workspaces</div>';
      return;
    }

    wsEl.innerHTML = workspaces.map(w => `
      <div class="row" data-ws-id="${esc(w.id)}" onclick="selectWorkspace('${esc(w.id)}')">
        <div class="row-icon">${w.personal ? '👤' : '🏢'}</div>
        <div class="row-content">
          <div class="row-title">${esc(w.title)}${w.is_current ? '<span class="tag">current</span>' : ''}${w.deactivated ? '<span class="tag" style="color:var(--color-crimson);background:rgba(235,87,87,0.12)">off</span>' : ''}</div>
          <div class="row-meta mono">${shortId(w.id)}${w.plan ? ' · ' + esc(w.plan) : ''}</div>
        </div>
      </div>
    `).join('');
    highlightRows();
  } catch (e) {
    wsEl.innerHTML = `<div class="empty">Error: ${esc(e.message)}</div>`;
  }
}

async function selectWorkspace(id) {
  const ws = window._workspaces?.[id];
  if (!ws || !state.account) return;
  state.workspace = ws;
  state.mode = null;
  hideChat();
  updateBreadcrumb();
  highlightRows();

  document.getElementById('mode-subtitle').textContent = ws.title;
  await renderModes();
}

async function renderModes() {
  const el = document.getElementById('modes-list');
  if (!state.account || !state.workspace) { renderModesEmpty(); return; }

  el.innerHTML = '<div class="loading"><div class="spinner"></div> Loading GPTs…</div>';

  let gpts = [];
  try {
    const data = await api(`/admin/api/accounts/${state.account.id}/gpts?workspace_id=${state.workspace.id}`);
    gpts = data.data || [];
  } catch (e) {
    el.innerHTML = `<div class="empty">Error loading GPTs: ${esc(e.message)}</div>`;
    return;
  }

  const cards = [
    `<div class="mode-card" data-mode="default" onclick="selectMode('default')">
      <div class="mode-card-icon">💬</div>
      <div class="mode-card-title">Chat thường</div>
      <div class="mode-card-desc">Primary assistant — không dùng Custom GPT</div>
      <div class="mode-card-id">model: auto</div>
    </div>`,
    ...gpts.map(g => `
      <div class="mode-card" data-mode="gizmo-${esc(g.id)}" onclick="selectMode('gizmo', '${esc(g.id)}', '${esc(g.name)}')">
        <div class="mode-card-icon">${g.gizmo_type === 'snorlax' ? '📁' : '🤖'}</div>
        <div class="mode-card-title">${esc(g.name)}</div>
        <div class="mode-card-desc">${esc(g.description || g.gizmo_type || 'Custom GPT')}</div>
        <div class="mode-card-id">${esc(g.id)}</div>
      </div>
    `),
  ];

  el.innerHTML = `<div class="mode-grid">${cards.join('')}</div>`;
  highlightRows();
}

function renderWorkspacesEmpty() {
  document.getElementById('workspaces-list').innerHTML =
    '<div class="empty"><div class="empty-icon">◎</div>Chọn account bên trái</div>';
  document.getElementById('ws-subtitle').textContent = 'Select an account';
}

function renderModesEmpty() {
  document.getElementById('modes-list').innerHTML =
    '<div class="empty"><div class="empty-icon">◎</div>Chọn workspace ở giữa</div>';
  document.getElementById('mode-subtitle').textContent = 'Select a workspace';
}

function selectMode(type, gizmoId, gizmoName) {
  if (type === 'default') {
    state.mode = { type: 'default', label: 'Chat thường', gizmo_id: null };
  } else {
    state.mode = { type: 'gizmo', label: gizmoName || gizmoId, gizmo_id: gizmoId };
  }
  state.messages = [];
  updateBreadcrumb();
  highlightRows();
  showChat();
  renderMessages();
}

function showChat() {
  const panel = document.getElementById('chat-panel');
  panel.classList.remove('hidden');
  const parts = [state.account?.label, state.workspace?.title, state.mode?.label].filter(Boolean);
  document.getElementById('chat-mode-label').textContent = parts.join(' → ');
  document.getElementById('chat-input').focus();
}

function hideChat() {
  document.getElementById('chat-panel').classList.add('hidden');
  state.messages = [];
}

function renderMessages() {
  const el = document.getElementById('chat-messages');
  if (!state.messages.length) {
    el.innerHTML = '<div class="msg msg-system">Bắt đầu cuộc hội thoại mới</div>';
    return;
  }
  el.innerHTML = state.messages.map(m =>
    `<div class="msg msg-${m.role}">${esc(m.content)}</div>`
  ).join('');
  el.scrollTop = el.scrollHeight;
}

function highlightRows() {
  document.querySelectorAll('[data-account-id]').forEach(el => {
    el.classList.toggle('selected', state.account && el.dataset.accountId === state.account.id);
  });
  document.querySelectorAll('[data-ws-id]').forEach(el => {
    el.classList.toggle('selected', state.workspace && el.dataset.wsId === state.workspace.id);
  });
  document.querySelectorAll('.mode-card').forEach(el => {
    const isDefault = state.mode?.type === 'default' && el.dataset.mode === 'default';
    const isGizmo = state.mode?.type === 'gizmo' && el.dataset.mode === `gizmo-${state.mode.gizmo_id}`;
    el.classList.toggle('selected', isDefault || isGizmo);
  });
}

async function sendMessage() {
  if (state.sending || !state.account || !state.workspace || !state.mode) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  state.messages.push({ role: 'user', content: text });
  renderMessages();

  state.sending = true;
  document.getElementById('btn-send').disabled = true;

  const body = {
    workspace_id: state.workspace.id,
    model: 'auto',
    messages: state.messages.map(m => ({ role: m.role, content: m.content })),
    stream: false,
  };
  if (state.mode.gizmo_id) body.gizmo_id = state.mode.gizmo_id;

  try {
    const data = await api(`/admin/api/accounts/${state.account.id}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const reply = data.choices?.[0]?.message?.content || '(empty response)';
    state.messages.push({ role: 'assistant', content: reply });
    renderMessages();
  } catch (e) {
    state.messages.push({ role: 'system', content: `Error: ${e.message}` });
    renderMessages();
  } finally {
    state.sending = false;
    document.getElementById('btn-send').disabled = false;
    input.focus();
  }
}

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

loadAccounts();
</script>
</body>
